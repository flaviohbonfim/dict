<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <clipPath id="roundedRect">
    <rect x="2" y="2" width="28" height="28" rx="6" ry="6"/>
  </clipPath>
  
  <g clip-path="url(#roundedRect)">
    <!-- Main background - dark gray/blue -->
    <rect x="2" y="2" width="28" height="28" fill="#3b4252"/>
    
    <!-- Bottom bar - Nord blue -->
    <rect x="2" y="20" width="28" height="10" fill="#5e81ac"/>
  </g>
  
  <!-- Letter "d" lowercase - bold and larger -->
  <text x="16" y="20.5" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#eceff4" text-anchor="middle">d</text>
</svg>
